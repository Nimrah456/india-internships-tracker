name: Update Internship Listings

on:
  schedule:
    # Runs daily at 04:00 UTC (~9:30 AM IST)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" trigger
  push:
    paths:
      - "scripts/companies.json"   # re-run immediately when companies are added

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Update README
        run: python scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "internship-bot"
          git config user.email "actions@github.com"
          git add data/internships.json README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update internship listings [automated]"
            git push
          fi
